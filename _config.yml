name: YAML | Bellinger Research Group — Yale University
url: http://www.astro.yale.edu/bellinger/

exclude: [bibble, README.md, Makefile, screenshot.png]

# colorize code snippets with the pygments module
highlighter: pygments

# The path structure for blog posts.
permalink: /blog/:year/:month/:day/:title.html

# Sections on the "people" page.
roles:
  - key: faculty
    name: Faculty
  - key: postdoc
    name: Postdoctoral Researchers
  - key: grad
    name: Graduate Students
  - key: postdog
    name: Postdogs
  - key: ugrad
    name: Undergraduate Students
  - key: ugrad-alum
    name: Undergraduate Alumni
  - key: alum-grad
    name: Graduate Alumni
  - key: alum-postdoc
    name: Postdoctoral Alumni
#  - key: staff
#    name: Staff
#  - key: postgrad
#    name: Postgraduate Researchers
#  - key: collab
#    name: Collaborators

# Number of news stories on the front page.
front_page_news: 5
front_page_papers: 5

# Base pathname for links.
base: '.'

# make pages for the _projects folder
collections:
  projects:
    output: true

# Navigation bar links.
navigation:
  - title: Home
    link: /
  - title: News
    link: /blog.html
  - title: People
    link: /people.html
  - title: Funding
    link: /funding.html
  - title: Papers
    link: /publications.html
#  - title: Research
#    link: /research.html
#  - title: Publications
#    link: /publications.html
#  - title: Code
#    link: /code.html
